<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Callspire — authorized</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e4e6eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #1a1d27;
            border: 1px solid #2a2d37;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .ok {
            width: 56px;
            height: 56px;
            margin: 0 auto 20px;
            background: #1b3d2d;
            color: #6ee7a8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
        }
        h1 { font-size: 20px; font-weight: 600; margin-bottom: 10px; }
        p { color: #8b8fa3; font-size: 14px; line-height: 1.5; margin-bottom: 8px; }
        .btn {
            display: inline-block;
            margin-top: 24px;
            padding: 12px 24px;
            background: #4f8cff;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
        }
        .btn:hover { background: #3d7be8; }
        .hint { margin-top: 18px; font-size: 12px; color: #555; }
        .muted { margin-top: 14px; font-size: 12px; color: #6b7080; }
    </style>
</head>
<body>
    <div class="card">
        <div class="ok">✓</div>
        <h1>Authorized</h1>
        <p>The Callspire softphone will open in a moment.</p>
        <p class="muted">If nothing happens, click the button below.</p>
        <a class="btn" href="{{ redirect_url|e }}">Open Callspire</a>
        <p class="hint">You can close this tab after the app opens.</p>
    </div>
    <script>
        var REDIRECT = {{ redirect_url | tojson }};
        function go() {
            window.location.href = REDIRECT;
        }
        window.setTimeout(go, 900);
    </script>
</body>
</html>
