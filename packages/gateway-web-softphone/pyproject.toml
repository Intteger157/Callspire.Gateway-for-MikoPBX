[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "gateway-web-softphone"
version = "0.1.0"
description = "Web softphone UI + session API mounted on Callspire PBX Gateway (FastAPI)"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "fastapi>=0.115.0",
  "httpx>=0.27.0",
  "starlette>=0.38.0",
  "itsdangerous>=2.0.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["gateway_web_softphone*"]
